<!-- Website header -->
<header class="site-header">
    <!-- Main navigation links -->
    <nav class="main-navigation">
        <a href="{% url 'artwork-index' %}">Artworks</a>
        <a href="{% url 'artist-index' %}">Artists</a>
        <a href="{% url 'gallery-index' %}">Galleries</a>
    </nav>
    <!-- Website logo which links to homepage -->
    <a href="{% url 'home' %}" class="site-logo">ArtVault</a>
    <!-- Header actions -->
    <div class="header-actions">
        <!-- Search bar -->
        <form>
            <div class="search">
                <input class="search-input" type="search" placeholder="Search">
                <span class="search-icon material-symbols-outlined">search</span>
            </div>
        </form>

        <!-- Shows user menu if user is signed in -->
        {% if user.is_authenticated %}

            <a href="{% url 'account-profile' %}" class="user-menu">

                {% if user.profile.profile_image %}
                    <img
                        class="user-icon"
                        src="{{ user.profile.profile_image.url }}"
                        alt="Profile image for {{ user.first_name }}"
                    >
                {% else %}
                    <span class="material-symbols-outlined user-icon">
                        account_circle
                    </span>
                {% endif %}

                        <span class="username">
                            {% if user.first_name %}
                                {{ user.first_name }}
                            {% else %}
                                {{ user.username }}
                            {% endif %}
                        </span>
                    </a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="site-btn btn-outline-custom auth-btn">
                            Log out
                        </button>
                    </form>
                {% else %}

                    <div class="auth-links">
                        <a href="{% url 'login' %}" class="site-btn btn-outline-custom auth-btn">
                            Log in
                        </a>

                        <a href="{% url 'register' %}" class="site-btn btn-main auth-btn">
                            Sign up
                        </a>
                    </div>
                {% endif %}
    </div>
</header>

<!-- TODO fjarlægja tímabundið css til að prófa stærð á icon mynd -->
<style>
    .user-menu img.user-icon {
    width: 42px;
    height: 42px;

    border-radius: 50%;
    object-fit: cover;

    display: block;
}

</style>
