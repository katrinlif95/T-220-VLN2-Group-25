<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists | ArtVault</title>
</head>
<body>

{# Loop through all artists sent from the view #}
{% for artist in artists %}

    {# Link to this artist's detail/profile page #}
    <a href="{% url 'artist-detail' artist.id %}">

        {# Show the artist's public display name #}
        <h2>{{ artist.display_name }}</h2>

    </a>

{% endfor %}

</body>
</html>
