<section class="artwork-grid">

    {% for art in artworks %}
    <article class="artwork-card">
        <h2>{{ art.title }}</h2>
        <p>{{ art.medium }}</p>
        <p>{{ art.dimensions }}</p>
        <p>{{ art.price }} kr.</p>

        {% if art.sold %}
            <p>Sold</p>
        {% else %}
            <p>Available</p>
        {% endif %}
    </article>
    {% endfor %}

</section>
