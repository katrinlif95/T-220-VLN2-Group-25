{% extends 'base.html' %}

{% block title %}Contact information | ArtVault{% endblock %}

{% block content %}
<section class="account-page">

    {% include 'user/_account_navigation.html' with active_page="Contact information" active_tab="contact" %}

    <!-- Contact information content -->
    <section class="contact-section">
        <form class="contact-form" method="post">

            {% csrf_token %}

            <!-- Street address -->
            <div class="contact-form-row">
                <label for="street-address">Street address</label>
                <input id="street-address" name="street_address" type="text" value="{{ contact.street_address|default:'' }}">
            </div>

            <!-- City + postal code -->
            <div class="contact-form-split-row">
                <div class="contact-field">
                    <label for="city">City</label>
                    <input id="city" name="city" type="text" value="{{ contact.city|default:'' }}">
                </div>

                <div class="contact-field">
                    <label for="postal-code">Postal code</label>
                    <input id="postal-code" name="postal_code" type="text" value="{{ contact.postal_code|default:'' }}">
                </div>
            </div>

            <!-- Country -->
            <div class="contact-form-row">
                <label for="country">Country</label>
                <select id="country" name="country">

                    <option value=""
                        {% if not contact.country %}selected{% endif %}>
                        Select country
                    </option>

                    <option value="IS"
                        {% if contact.country == "IS" %}selected{% endif %}>
                        Iceland
                    </option>

                    <option value="DK"
                        {% if contact.country == "DK" %}selected{% endif %}>
                        Denmark
                    </option>

                    <option value="NO"
                        {% if contact.country == "NO" %}selected{% endif %}>
                        Norway
                    </option>

                    <option value="SE"
                        {% if contact.country == "SE" %}selected{% endif %}>
                        Sweden
                    </option>

                    <option value="FI"
                        {% if contact.country == "FI" %}selected{% endif %}>
                        Finland
                    </option>

                    <option value="UK"
                        {% if contact.country == "UK" %}selected{% endif %}>
                        United Kingdom
                    </option>

                    <option value="US"
                        {% if contact.country == "US" %}selected{% endif %}>
                        United States
                    </option>

                </select>
            </div>

            <!-- National id -->
            <div class="contact-form-row">
                <label for="national-id">National ID</label>
                <input id="national-id" name="national_id" type="text" value="{{ contact.national_id|default:'' }}">
            </div>

            <button class="site-btn btn-main" type="submit">
                Save changes
            </button>

        </form>
    </section>
</section>

{% endblock %}
