{% extends 'base.html' %}

{% block title %}Contact information | ArtVault{% endblock %}

{% block content %}
<section class="account-page">

    {% include 'user/_account_navigation.html' with active_page="Contact information" active_tab="contact" %}

    <!-- Contact information content -->
    <section class="contact-section">
        <form class="contact-form">

            <!-- Street address -->
            <div class="contact-form-row">
                <label for="street-address">Street address</label>
                <input id="street-address" name="street_address" type="text" value="">
            </div>

            <!-- City + postal code -->
            <div class="contact-form-split-row">
                <div class="contact-field">
                    <label for="city">City</label>
                    <input id="city" name="city" type="text" value="">
                </div>

                <div class="contact-field">
                    <label for="postal-code">Postal code</label>
                    <input id="postal-code" name="postal_code" type="text" value="">
                </div>
            </div>

            <!-- Country -->
            <div class="contact-form-row">
                <label for="country">Country</label>

                <select id="country">
                    <option value="">Select country</option>
                    <option value="IS">Iceland</option>
                    <option value="DK">Denmark</option>
                    <option value="NO">Norway</option>
                    <option value="SE">Sweden</option>
                    <option value="FI">Finland</option>
                </select>
            </div>

            <!-- National id -->
            <div class="contact-form-row">
                <label for="national-id">National ID</label>
                <input id="national-id" name="national_id" type="text" value="">
            </div>

            <button class="site-btn btn-main" type="submit">
                Save changes
            </button>

        </form>
    </section>
</section>

{% endblock %}
