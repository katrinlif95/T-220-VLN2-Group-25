<!-- Breadcrumbs -->
<nav class="breadcrumbs">
    <a href="{% url 'home' %}">Homepage</a>
    <span>></span>
    {% if active_tab == "profile" %}
        <span class="current-page">
            My account<span class="breadcrumb-separator">></span>Profile
        </span>
    {% else %}
        <a href="{% url 'account-profile' %}">
            My account
        </a>
        <span>></span>
        <span class="current-page">
            {{ active_page }}
        </span>
    {% endif %}
</nav>

<h2 class="account-title"><strong>My account</strong></h2>

<!-- Account tabs -->
<nav class="account-tabs" aria-label="Account sections">
    <a href="{% url 'account-profile' %}"
       class="{% if active_tab == 'profile' %}active{% endif %}">
        Profile
    </a>

    <a href="{% url 'account-bids' %}"
       class="{% if active_tab == 'bids' %}active{% endif %}">
        Bids
    </a>

    <a href="{% url 'account-contact' %}"
       class="{% if active_tab == 'contact' %}active{% endif %}">
        Contact information
    </a>
</nav>
